services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal_network
    healthcheck:
      test: pg_isready -U novacontent_user -d novacontent_db
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:alpine
    restart: always
    networks:
      - internal_network

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - internal_network
    volumes:
      - ./output:/usr/src/app/output
    env_file: .env
    command: bun run src/index.ts

  worker:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - internal_network
    volumes:
      - ./output:/usr/src/app/output
    env_file: .env
    command: bun run src/workers/render-worker.ts

networks:
  internal_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
